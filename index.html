<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <title>SupplyPredict — Toyo Foods</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'monospace'],
          },
          colors: {
            // Base — driven by CSS vars so aesthetic + dark mode can re-skin
            ink:    'rgb(var(--ink) / <alpha-value>)',
            sub:    'rgb(var(--sub) / <alpha-value>)',
            mute:   'rgb(var(--mute) / <alpha-value>)',
            line:   'rgb(var(--line) / <alpha-value>)',
            surf:   'rgb(var(--surf) / <alpha-value>)',
            surf2:  'rgb(var(--surf2) / <alpha-value>)',
            page:   'rgb(var(--page) / <alpha-value>)',
            brand:  'rgb(var(--brand) / <alpha-value>)',
            crit:   'rgb(var(--crit) / <alpha-value>)',
            critbg: 'rgb(var(--crit-bg) / <alpha-value>)',
            warn:   'rgb(var(--warn) / <alpha-value>)',
            warnbg: 'rgb(var(--warn-bg) / <alpha-value>)',
            ok:     'rgb(var(--ok) / <alpha-value>)',
            okbg:   'rgb(var(--ok-bg) / <alpha-value>)',
          },
          boxShadow: {
            card: '0 1px 0 rgb(var(--line) / 1), 0 1px 2px rgb(0 0 0 / 0.02)',
            'card-h': '0 0 0 1px rgb(var(--line) / 1), 0 8px 24px -8px rgb(0 0 0 / 0.10)',
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React 18 + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Order matters: helpers first, pages second, app last -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="product-detail.jsx"></script>
  <script type="text/babel" src="metrics.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
